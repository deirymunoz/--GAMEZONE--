<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recuperar Contraseña - GameZone</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: rgba(20, 25, 40, 0.88);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(33, 150, 243, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(90deg, #ffcc00, #ff9800);
      padding: 30px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 2.1rem;
      margin-bottom: 8px;
      color: #0d1b2a;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .header p {
      color: rgba(13, 27, 42, 0.9);
      font-size: 1rem;
    }

    .form-container {
      padding: 32px 28px;
    }

    .input-group {
      position: relative;
      margin-bottom: 24px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 1px solid rgba(33, 150, 243, 0.4);
      border-radius: 10px;
      background: rgba(30, 40, 60, 0.7);
      color: #ffffff;
      font-size: 1rem;
      transition: all 0.25s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #ffcc00;
      box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.3);
      background: rgba(40, 50, 70, 0.9);
    }

    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #90caf9;
      font-size: 1.2rem;
    }

    .btn-recover {
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #ffcc00, #ffb300);
      color: #0d1b2a;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(255, 204, 0, 0.5);
    }

    .btn-recover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 204, 0, 0.6);
      background: linear-gradient(90deg, #ffdd33, #ffc107);
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
      color: #90caf9;
      font-size: 0.95rem;
    }

    .back-link a {
      color: #ffcc00;
      text-decoration: none;
      font-weight: 500;
    }

    .back-link a:hover {
      color: #ffe082;
      text-decoration: underline;
    }

    #message {
      margin: 20px 0;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 1rem;
      line-height: 1.5;
    }

    .success { background: rgba(0, 255, 127, 0.15); color: #90ffaa; }
    .error { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }

    #redirectBtn {
      margin-top: 15px;
      padding: 10px 20px;
      background: #ffcc00;
      color: #0d1b2a;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }

    #redirectBtn:hover {
      background: #ffdd33;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>GameZone</h1>
      <p>Recupera tu contraseña</p>
    </div>

    <div class="form-container">
      <p style="text-align: center; margin-bottom: 25px; color: #bbdefb;">
        Ingresa tu correo electrónico o nombre de usuario y te enviaremos instrucciones para recuperar tu cuenta.
      </p>

      <form id="recoverForm">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="text" id="identifier" placeholder="Correo electrónico o usuario" required>
        </div>

        <button type="submit" class="btn-recover">Recuperar contraseña</button>
      </form>

      <div id="message" style="display: none;"></div>

      <div class="back-link">
        ¿Recordaste tu contraseña? <a href="login.html">Volver al inicio de sesión</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('recoverForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.style.display = 'none';

      const identifier = document.getElementById('identifier').value.trim();

      if (!identifier) {
        message.textContent = 'Por favor ingresa tu correo o usuario';
        message.className = 'error';
        message.style.display = 'block';
        return;
      }

      try {
        // 1. Obtener usuarios
        const res = await fetch('http://localhost:3000/users');
        if (!res.ok) throw new Error('Error al conectar');

        const users = await res.json();
        const user = users.find(u => u.email === identifier || u.username === identifier);

        if (!user) {
          message.textContent = 'No encontramos ninguna cuenta con ese correo o usuario';
          message.className = 'error';
          message.style.display = 'block';
          return;
        }

        // 2. Generar contraseña temporal
        const tempPass = 'Temp' + Math.random().toString(36).slice(-8) + '!';

        // 3. Actualizar contraseña en db.json
        const updateRes = await fetch(`http://localhost:3000/users/${user.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: tempPass })
        });

        if (!updateRes.ok) throw new Error('No se pudo actualizar la contraseña');

        // 4. Mensaje de éxito + botón + redirección automática
        message.innerHTML = `
          <strong>¡Enlace enviado!</strong><br>
          Se ha enviado un enlace de recuperación a <b>${user.email}</b>.<br><br>
          Para pruebas, tu contraseña temporal es: <b style="background:#ffcc0033; padding:4px 8px; border-radius:6px;">${tempPass}</b><br>
          Usa esta contraseña para iniciar sesión y cámbiala después.<br><br>
          Redirigiendo al login en <span id="countdown">5</span> segundos...
          <br><button id="redirectBtn">Ir al login ahora</button>
        `;
        message.className = 'success';
        message.style.display = 'block';

        // Redirección automática después de 5 segundos
        let seconds = 5;
        const countdown = document.getElementById('countdown');
        const interval = setInterval(() => {
          seconds--;
          if (countdown) countdown.textContent = seconds;
          if (seconds <= 0) {
            clearInterval(interval);
            window.location.href = 'login.html';
          }
        }, 1000);

        // Botón manual para ir al login
        document.getElementById('redirectBtn').addEventListener('click', () => {
          clearInterval(interval);
          window.location.href = 'login.html';
        });

      } catch (err) {
        console.error(err);
        message.textContent = 'No pudimos procesar la solicitud. Verifica que json-server esté corriendo.';
        message.className = 'error';
        message.style.display = 'block';
      }
    });
  </script>

</body>
</html>
